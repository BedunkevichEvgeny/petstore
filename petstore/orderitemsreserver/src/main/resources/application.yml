spring:
  application:
    name: orderitemsreserver
  cloud:
    azure:
      storage:
        blob:
          # Connection string for Azure Blob Storage
          # For local development with Azurite: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=...;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1
          connection-string: ${AZURE_STORAGE_CONNECTION_STRING:null}
          # Container name for storing order items
          container-name: ${AZURE_STORAGE_CONTAINER_NAME:order-items}
          # Note: account-name is not needed when using connection-string (it overrides the endpoint)

server:
  port: ${ORDERITEMSRESERVER_SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.chtrembl: DEBUG

