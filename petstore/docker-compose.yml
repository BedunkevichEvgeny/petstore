services:
  postgres:
    image: postgres:17-alpine
    container_name: petstore-postgres
    environment:
      - POSTGRES_DB=${DATABASE_name:-petstoreproductservice_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  petstoreapp:
    build:
      context: ./petstoreapp
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Set to true if you have a connection string set in .env:
      - APPLICATIONINSIGHTS_ENABLED=false
      # Enables External ID login/logout flow locally. Set additional configs in .env:
      - PETSTORE_SECURITY_ENABLED=false

  petstorepetservice:
    build:
      context: ./petstorepetservice
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_PET_URL=postgres
      - DATABASE_PET_PORT=5432
      - DATABASE_PET_name=${DATABASE_PET_name:-petstorepetservice_db}
      - POSTGRES_PET_USER=${POSTGRES_PET_USER:-postgres}
      - POSTGRES_PET_PASSWORD=${POSTGRES_PET_PASSWORD:-postgres}

  petstoreproductservice:
    build:
      context: ./petstoreproductservice
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_URL=postgres
      - DATABASE_PORT=5432
      - DATABASE_name=${DATABASE_name:-petstoreproductservice_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}

  petstoreorderservice:
    build:
      context: ./petstoreorderservice
    ports:
      - "8083:8083"
    env_file:
      - .env

  orderitemsreserver:
    build:
      context: ./orderitemsreserver
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - ORDERITEMSRESERVER_SERVER_PORT=8084

volumes:
  postgres-data: