spring:
  application:
    name: petstoreorderservice
server:
  port: ${PETSTOREORDERSERVICE_SERVER_PORT:8080}

# Azure Cosmos DB Configuration (used by DBConfig.java)
azure:
  cosmos:
    uri: ${AZURE_COSMOS_ENDPOINT:https://localhost:8081}
    key: ${AZURE_COSMOS_KEY:somekey}
    database: ${AZURE_COSMOS_DATABASE:yb-petstiore-cosmos-db}

petstore:
  service:
    product:
      url: ${PETSTOREPRODUCTSERVICE_URL:http://localhost:8082}
    orderitemsreserver:
      queue-name: ${ORDERITEMSRESERVER_QUEUE_NAME:user-order}
      connection-string: ${ORDERITEMSRESERVER_SERVICEBUS_CONNECTION:null}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    ssl:
      enabled: false
    diskspace:
      enabled: false

logging:
  level:
    root: INFO
    com.chtrembl: DEBUG
